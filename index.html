<!DOCTYPE html>
<html lang="en" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>DayPlan — Daily Itinerary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0a;
  --bg2:#141414;
  --surface:#1c1c1c;
  --surface2:#222;
  --border:rgba(255,255,255,.08);
  --borderl:rgba(255,255,255,.05);
  --t1:#f0f0f0;
  --t2:#888;
  --t3:#444;
  --accent:#6366f1;
  --accenth:#5557e8;
  --accentl:rgba(99,102,241,.15);
  --ok:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
  --mor:#f59e0b;
  --aft:#60a5fa;
  --eve:#fb7185;
  --ngt:#a78bfa;
  --cw:#818cf8;--cp:#34d399;--cf:#fbbf24;--ct:#22d3ee;--cs:#f472b6;
  --r:12px;--rs:8px;--rx:6px;
  --sh:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --shl:0 8px 32px rgba(0,0,0,.6),0 4px 8px rgba(0,0,0,.4);
  --ease:cubic-bezier(0.22,1,0.36,1);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}

/* ── Reset & base ── */
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── Skip link ── */
.skip-link{position:absolute;top:-100%;left:16px;z-index:9999;padding:10px 18px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;border-radius:0 0 var(--rs) var(--rs);text-decoration:none;transition:top .15s var(--ease)}
.skip-link:focus{top:0}

/* ── Screen reader only ── */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ── Focus ── */
:focus{outline:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}

/* ── App shell ── */
.app{max-width:1200px;margin:0 auto;padding:0 20px 96px}

/* ── HEADER ── */
.hdr{padding:28px 0 20px;position:sticky;top:0;z-index:100;background:var(--bg)}
.hdr-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.hdr-left{}
.hdr-title{font-size:28px;font-weight:800;letter-spacing:-.6px;color:var(--t1);text-wrap:balance}
.hdr-date{font-size:13px;color:var(--t2);margin-top:4px;font-weight:400}
.hdr-acts{display:flex;gap:8px;align-items:center;padding-top:4px}
.hdr-divider{height:1px;background:var(--border);margin-bottom:24px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 14px;min-height:36px;
  border-radius:var(--rs);font-size:13px;font-weight:500;font-family:var(--font);
  cursor:pointer;border:none;white-space:nowrap;
  transition:background 150ms var(--ease),color 150ms var(--ease),border-color 150ms var(--ease),transform 100ms var(--ease);
}
.btn:active{transform:scale(0.97)}
.btn-ghost{background:transparent;color:var(--t2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--surface);color:var(--t1);border-color:rgba(255,255,255,.15)}
.btn-primary{background:#fff;color:#000;border:1.5px solid transparent;font-weight:600}
.btn-primary:hover{background:rgba(255,255,255,.9)}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.5)}

/* ── PROGRESS ── */
.prog{margin:0 0 28px;display:flex;align-items:center;gap:16px}
.prog-label{font-size:13px;color:var(--t2);white-space:nowrap;flex-shrink:0}
.prog-track{
  flex:1;height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;
  role:progressbar;
}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a5b4fc);border-radius:99px;transition:width 600ms cubic-bezier(.34,1.56,.64,1)}
.prog-pct{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;flex-shrink:0;min-width:32px;text-align:right}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start}
@media(max-width:768px){.grid{grid-template-columns:1fr}}

/* ── VIEW TOGGLE ── */
.view-toggle{display:none;margin-bottom:16px}
@media(max-width:768px){.view-toggle{display:block}}
.vtog{display:flex;background:var(--surface);border-radius:var(--rs);padding:3px;gap:2px;width:fit-content}
.vtog-btn{padding:6px 16px;min-height:32px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:transparent;color:var(--t2);transition:background 150ms var(--ease),color 150ms var(--ease);font-family:var(--font)}
.vtog-btn.active{background:var(--surface2);color:var(--t1)}
.vtog-btn:active{transform:scale(0.97)}

/* ── SECTIONS ── */
.sections{display:flex;flex-direction:column;gap:12px}
.section{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);background:var(--surface)}
.section[data-s=morning]{--sec-col:var(--mor)}
.section[data-s=afternoon]{--sec-col:var(--aft)}
.section[data-s=evening]{--sec-col:var(--eve)}
.section[data-s=night]{--sec-col:var(--ngt)}

.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;cursor:pointer;user-select:none;
  border-left:3px solid var(--sec-col);
  transition:background 150ms var(--ease);
}
.sec-hdr:hover{background:var(--surface2)}
.sec-hdr:active{background:var(--bg2)}
.sec-left{display:flex;align-items:center;gap:10px}
.sec-dot{width:8px;height:8px;border-radius:50%;background:var(--sec-col);flex-shrink:0}
.sec-name{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.2px}
.sec-range{font-size:11px;color:var(--t3);padding:2px 6px;background:var(--bg2);border-radius:4px;border:1px solid var(--border)}
.sec-right{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;font-weight:600;color:var(--t2);padding:2px 8px;background:var(--bg2);border-radius:99px;border:1px solid var(--border)}
.chevron{font-size:10px;color:var(--t3);transition:transform 250ms var(--ease)}
.section.collapsed .chevron{transform:rotate(-90deg)}

/* Animated collapse */
.sec-body-wrap{display:grid;grid-template-rows:1fr;transition:grid-template-rows 280ms var(--ease)}
.section.collapsed .sec-body-wrap{grid-template-rows:0fr}
.sec-body{overflow:hidden;padding:8px}

.drop-zone{min-height:40px;border-radius:var(--rs);display:flex;flex-direction:column;gap:3px;padding:2px;transition:background 150ms var(--ease)}
.drop-zone.drag-over{background:var(--accentl)}
.sec-empty{display:flex;align-items:center;justify-content:center;height:40px;font-size:12px;color:var(--t3)}

/* ── TASK CARDS ── */
@keyframes cardIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.card{
  display:flex;align-items:flex-start;gap:10px;padding:12px 14px;
  border-radius:var(--rs);background:var(--bg);
  border:1px solid var(--border);cursor:grab;
  transition:background 150ms var(--ease),border-color 150ms var(--ease),transform 100ms var(--ease);
  position:relative;border-left:2px solid transparent;
  animation:cardIn 200ms var(--ease) both;
  animation-delay:calc(var(--i,0)*30ms);
}
@media(hover:hover) and (pointer:fine){.card:hover{background:var(--surface2);border-color:rgba(255,255,255,.12);transform:translateY(-1px)}}
.card.dragging{opacity:.4;cursor:grabbing}
.card.drag-over{border-color:var(--accent)}
.card.done .task-ttl{text-decoration:line-through;color:var(--t3)}
.card.done{opacity:.5}
.card[data-cat=work]{border-left-color:var(--cw)}
.card[data-cat=personal]{border-left-color:var(--cp)}
.card[data-cat=food]{border-left-color:var(--cf)}
.card[data-cat=travel]{border-left-color:var(--ct)}
.card[data-cat=shopping]{border-left-color:var(--cs)}
.card.important{border-left-color:var(--warn)!important}

.drag-hdl{display:flex;align-items:center;justify-content:center;width:12px;color:var(--t3);font-size:10px;cursor:grab;flex-shrink:0;margin-top:3px;opacity:0;transition:opacity 150ms var(--ease)}
.card:hover .drag-hdl{opacity:1}

.chkbox{
  width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);
  cursor:pointer;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  transition:background 150ms var(--ease),border-color 150ms var(--ease),transform 100ms var(--ease);
}
.chkbox:hover,.chkbox:focus-visible{border-color:var(--ok)}
.chkbox:active{transform:scale(0.88)}
.card.done .chkbox{background:var(--ok);border-color:var(--ok)}
.chk-svg{width:9px;height:9px;display:none}
.card.done .chk-svg{display:block}

.task-body{flex:1;min-width:0}
.task-ttl{font-size:14px;font-weight:500;color:var(--t1);line-height:1.4;transition:color 150ms var(--ease)}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.task-time{font-size:11px;color:var(--t3);font-weight:500;display:inline-flex;align-items:center;gap:3px}
.task-cat{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 6px;border-radius:4px}
.task-loc{font-size:11px;color:var(--t3);display:inline-flex;align-items:center;gap:3px}
.task-note{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.4;padding-left:2px;border-left:2px solid var(--border);padding-left:8px}

.card-acts{display:flex;gap:1px;flex-shrink:0;opacity:0;transition:opacity 150ms var(--ease)}
.card:hover .card-acts{opacity:1}
.act-btn{
  width:28px;height:28px;border-radius:var(--rx);border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--t3);
  transition:background 150ms var(--ease),color 150ms var(--ease),transform 100ms var(--ease);
}
.act-btn:hover{background:var(--surface2);color:var(--t1)}
.act-btn:active{transform:scale(0.88)}
.act-btn.starred{color:var(--warn)}

.cat-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;display:inline-block}
.star-badge{font-size:10px;opacity:.8}

/* ── ADD BTN ── */
.add-sec-btn{
  width:100%;padding:7px;min-height:32px;
  border:1px dashed var(--border);border-radius:var(--rs);
  background:transparent;color:var(--t3);font-size:12px;font-family:var(--font);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:background 150ms var(--ease),color 150ms var(--ease),border-color 150ms var(--ease);
  margin-top:4px;
}
.add-sec-btn:hover{background:var(--surface2);color:var(--t2);border-color:rgba(255,255,255,.15)}
.add-sec-btn:active{transform:scale(0.99)}

/* ── TIMELINE ── */
.tl-panel{position:sticky;top:80px}
@media(max-width:768px){.tl-panel{position:static;display:none}}
@media(max-width:768px){.tl-panel.show{display:block}}
.tl-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.tl-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tl-ttl{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.6px}
.tl-body{padding:12px;max-height:75vh;overflow-y:auto}
.tl-body::-webkit-scrollbar{width:2px}
.tl-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.tl-sec{margin-bottom:16px}
.tl-sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tl-sec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tl-sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t2)}
.tl-sec-line{flex:1;height:1px;background:var(--border)}
.tl-item{display:flex;gap:8px;padding:3px 2px;border-radius:6px;transition:background 150ms var(--ease)}
.tl-item:hover{background:var(--bg2)}
.tl-tcol{width:44px;flex-shrink:0;padding-top:3px}
.tl-time{font-size:10px;font-weight:500;color:var(--t3);font-variant-numeric:tabular-nums}
.tl-dcol{width:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:5px}
.tl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tl-line{width:1px;flex:1;background:var(--border);min-height:12px;margin-top:3px}
.tl-content{flex:1;min-width:0;padding-bottom:10px}
.tl-task-ttl{font-size:12px;font-weight:500;color:var(--t1);line-height:1.3}
.tl-task-ttl.done{text-decoration:line-through;color:var(--t3)}
.tl-meta{font-size:10px;color:var(--t3);margin-top:2px}
.tl-empty{text-align:center;padding:32px 16px}
.tl-empty-icon{font-size:20px;margin-bottom:8px;opacity:.4}
.tl-empty-txt{font-size:12px;color:var(--t3);line-height:1.6}

/* ── SUMMARY ── */
.summary{background:var(--surface);border-radius:var(--r);padding:16px;border:1px solid var(--border);margin-top:12px}
.sum-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:12px}
.sum-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--bg2);border-radius:var(--rs);padding:12px 10px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:10px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.s-total .stat-val{color:var(--t1)}
.s-done .stat-val{color:var(--ok)}
.s-up .stat-val{color:var(--accent)}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  z-index:1000;display:flex;align-items:flex-end;justify-content:center;
  padding:12px;opacity:0;pointer-events:none;transition:opacity 200ms ease;
}
.overlay.open{opacity:1;pointer-events:all}
@media(min-width:600px){.overlay{align-items:center}}

.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);width:100%;max-width:480px;
  box-shadow:var(--shl);
  transform:scale(0.96) translateY(16px);
  transition:transform 280ms var(--ease);
  max-height:90vh;overflow-y:auto;
}
.overlay.open .modal{transform:scale(1) translateY(0)}
@media(max-width:599px){
  .modal{border-radius:var(--r) var(--r) 0 0;transform:translateY(20px)}
  .overlay.open .modal{transform:translateY(0)}
}

.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0}
.modal-ttl{font-size:16px;font-weight:700;color:var(--t1)}
.modal-close{width:30px;height:30px;border-radius:var(--rx);border:none;background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);transition:background 150ms var(--ease),transform 100ms var(--ease)}
.modal-close:hover{background:var(--surface2);color:var(--t1)}
.modal-close:active{transform:scale(0.9)}
.modal-body{padding:16px 20px}
.fg{margin-bottom:14px}
.flbl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.finput,.fsel,.ftxt{
  width:100%;padding:9px 12px;border-radius:var(--rs);
  border:1px solid var(--border);background:var(--bg2);
  font-size:14px;font-family:var(--font);color:var(--t1);
  transition:border-color 150ms var(--ease),box-shadow 150ms var(--ease);outline:none;
}
.finput::placeholder,.ftxt::placeholder{color:var(--t3)}
.finput:focus,.fsel:focus,.ftxt:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentl)}
.finput[aria-invalid=true]{border-color:var(--danger)}
.ftxt{resize:vertical;min-height:64px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

fieldset{border:none;padding:0;margin:0}
legend{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;display:block;width:100%}

/* Segment */
.seg{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--bg2);padding:2px;border-radius:var(--rs);border:1px solid var(--border)}
.seg-opt{display:none}
.seg-lbl{display:flex;align-items:center;justify-content:center;padding:6px 4px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;color:var(--t3);transition:background 150ms var(--ease),color 150ms var(--ease);text-align:center}
.seg-opt:checked+.seg-lbl{background:var(--surface2);color:var(--t1)}
.seg-opt:focus-visible+.seg-lbl{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}

/* Category pills */
.cat-pills{display:flex;gap:4px;flex-wrap:wrap}
.cat-opt{display:none}
.cat-lbl{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--t2);transition:background 150ms var(--ease),color 150ms var(--ease),border-color 150ms var(--ease)}
.cat-opt:checked+.cat-lbl{background:var(--accentl);color:var(--accent);border-color:var(--accent)}
.cat-opt:focus-visible+.cat-lbl{outline:2px solid var(--accent);outline-offset:2px}

/* Toggle */
.tog-row{display:flex;align-items:center;justify-content:space-between}
.tog-info{display:flex;flex-direction:column;gap:2px}
.tog-lbl{font-size:14px;font-weight:500;color:var(--t1)}
.tog-desc{font-size:12px;color:var(--t3)}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{display:none}
.tog-track{position:absolute;inset:0;background:var(--surface2);border-radius:99px;cursor:pointer;border:1px solid var(--border);transition:background 200ms var(--ease),border-color 200ms var(--ease)}
.tog-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:var(--t3);border-radius:50%;transition:transform 200ms var(--ease),background 200ms var(--ease);pointer-events:none}
.toggle input:checked~.tog-track{background:var(--warn);border-color:var(--warn)}
.toggle input:checked~.tog-thumb{transform:translateX(18px);background:#fff}
.toggle:focus-within .tog-track{outline:2px solid var(--accent);outline-offset:2px}

.modal-foot{display:flex;gap:8px;justify-content:flex-end;padding:0 20px 20px}

/* ── FAB ── */
.fab{
  position:fixed;bottom:24px;right:24px;width:52px;height:52px;
  border-radius:50%;background:var(--accent);color:#fff;border:none;
  cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(99,102,241,.5);
  transition:transform 150ms var(--ease),box-shadow 150ms var(--ease);
  z-index:500;line-height:1;
}
@media(hover:hover) and (pointer:fine){.fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(99,102,241,.6)}}
.fab:active{transform:scale(0.93)}

/* ── TOAST ── */
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast{
  position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--surface);color:var(--t1);padding:9px 16px;border-radius:var(--rs);
  font-size:13px;font-weight:500;border:1px solid var(--border);
  box-shadow:var(--shl);z-index:2000;opacity:0;white-space:nowrap;pointer-events:none;
}
.toast.show{animation:toastIn 200ms var(--ease) forwards}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<div class="app">

  <header class="hdr">
    <div class="hdr-inner">
      <div class="hdr-left">
        <h1 class="hdr-title">DayPlan</h1>
        <div class="hdr-date" id="dt-display" aria-live="polite"></div>
      </div>
      <div class="hdr-acts" role="group" aria-label="Day actions">
        <button class="btn btn-ghost" id="dup-btn" onclick="duplicateYesterday()">↩ Yesterday</button>
        <button class="btn btn-ghost btn-danger" onclick="clearAll()">Clear</button>
      </div>
    </div>
    <div class="hdr-divider"></div>
  </header>

  <main id="main-content">

    <!-- Progress bar -->
    <div class="prog">
      <span class="prog-label" id="prog-label">Progress</span>
      <div class="prog-track"
           role="progressbar"
           id="prog-bar"
           aria-labelledby="prog-label"
           aria-valuenow="0"
           aria-valuemin="0"
           aria-valuemax="100"
           aria-valuetext="0 of 0 tasks completed">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <span class="prog-pct" id="prog-text" aria-live="polite">0%</span>
    </div>

    <!-- Main grid -->
    <div class="grid">
      <div>
        <div class="view-toggle">
          <div class="vtog" role="group" aria-label="View toggle">
            <button class="vtog-btn active" id="vbtn-list" onclick="mobileView('list')" aria-pressed="true">List</button>
            <button class="vtog-btn" id="vbtn-tl" onclick="mobileView('timeline')" aria-pressed="false">Timeline</button>
          </div>
        </div>
        <div class="sections" id="sections" aria-label="Task sections"></div>
        <section class="summary" id="summary" aria-label="Day summary">
          <div class="sum-ttl">Summary</div>
          <div class="sum-stats">
            <div class="stat s-total"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total</div></div>
            <div class="stat s-done"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">Done</div></div>
            <div class="stat s-up"><div class="stat-val" id="s-up">0</div><div class="stat-lbl">Left</div></div>
          </div>
        </section>
      </div>

      <aside class="tl-panel" id="tl-panel" aria-label="Timeline">
        <div class="tl-card">
          <div class="tl-hdr">
            <span class="tl-ttl">Timeline</span>
          </div>
          <div class="tl-body" id="tl-body"></div>
        </div>
      </aside>
    </div>

  </main>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal(null)" aria-label="Add new task">
  <span aria-hidden="true">+</span>
</button>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)" role="presentation">
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-ttl">
    <div class="modal-hdr">
      <span class="modal-ttl" id="modal-ttl">Add Task</span>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="fg">
        <label class="flbl" for="f-title">Task</label>
        <input type="text" class="finput" id="f-title" placeholder="What do you need to do?" autocomplete="off">
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl" for="f-time">Time</label>
          <input type="time" class="finput" id="f-time">
        </div>
        <div class="fg">
          <fieldset>
            <legend>Section</legend>
            <div class="seg">
              <input type="radio" name="sec" id="s-mor" class="seg-opt" value="morning" checked>
              <label for="s-mor" class="seg-lbl">AM</label>
              <input type="radio" name="sec" id="s-aft" class="seg-opt" value="afternoon">
              <label for="s-aft" class="seg-lbl">PM</label>
              <input type="radio" name="sec" id="s-eve" class="seg-opt" value="evening">
              <label for="s-eve" class="seg-lbl">Eve</label>
              <input type="radio" name="sec" id="s-ngt" class="seg-opt" value="night">
              <label for="s-ngt" class="seg-lbl">Ngt</label>
            </div>
          </fieldset>
        </div>
      </div>
      <div class="fg">
        <fieldset>
          <legend>Category</legend>
          <div class="cat-pills">
            <input type="radio" name="cat" id="c-work" class="cat-opt" value="work">
            <label for="c-work" class="cat-lbl"><span class="cat-dot" style="background:var(--cw)" aria-hidden="true"></span>Work</label>
            <input type="radio" name="cat" id="c-personal" class="cat-opt" value="personal" checked>
            <label for="c-personal" class="cat-lbl"><span class="cat-dot" style="background:var(--cp)" aria-hidden="true"></span>Personal</label>
            <input type="radio" name="cat" id="c-food" class="cat-opt" value="food">
            <label for="c-food" class="cat-lbl"><span class="cat-dot" style="background:var(--cf)" aria-hidden="true"></span>Food</label>
            <input type="radio" name="cat" id="c-travel" class="cat-opt" value="travel">
            <label for="c-travel" class="cat-lbl"><span class="cat-dot" style="background:var(--ct)" aria-hidden="true"></span>Travel</label>
            <input type="radio" name="cat" id="c-shop" class="cat-opt" value="shopping">
            <label for="c-shop" class="cat-lbl"><span class="cat-dot" style="background:var(--cs)" aria-hidden="true"></span>Shopping</label>
          </div>
        </fieldset>
      </div>
      <div class="fg">
        <label class="flbl" for="f-loc">Location</label>
        <input type="text" class="finput" id="f-loc" placeholder="Optional" autocomplete="off">
      </div>
      <div class="fg">
        <label class="flbl" for="f-notes">Notes</label>
        <textarea class="ftxt" id="f-notes" placeholder="Any extra details…"></textarea>
      </div>
      <div class="fg">
        <div class="tog-row">
          <div class="tog-info">
            <label class="tog-lbl" for="f-important">Mark as Important</label>
            <span class="tog-desc" id="important-desc">Highlight for priority</span>
          </div>
          <label class="toggle" aria-describedby="important-desc">
            <input type="checkbox" id="f-important">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

<script>
const SECS=[
  {id:'morning',name:'Morning',range:'5 – 12am',col:'var(--mor)'},
  {id:'afternoon',name:'Afternoon',range:'12 – 5pm',col:'var(--aft)'},
  {id:'evening',name:'Evening',range:'5 – 9pm',col:'var(--eve)'},
  {id:'night',name:'Night',range:'9pm – 5am',col:'var(--ngt)'}
];
const CAT_COL={work:'var(--cw)',personal:'var(--cp)',food:'var(--cf)',travel:'var(--ct)',shopping:'var(--cs)'};
const CAT_LBL={work:'Work',personal:'Personal',food:'Food',travel:'Travel',shopping:'Shopping'};

function fmtDate(d){return d.toISOString().split('T')[0]}
const TODAY=fmtDate(new Date());
const YESTERDAY=fmtDate(new Date(Date.now()-86400000));

let tasks=[],dragSrc=null,editId=null,lastFocused=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function sk(d){return 'dayplan_'+d}
function esc(s){const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}

function fmt12(t){
  if(!t)return '';
  const[h,m]=t.split(':').map(Number);
  return (h%12||12)+':'+(m+'').padStart(2,'0')+(h>=12?' PM':' AM');
}

function secFromTime(t){
  if(!t)return null;
  const h=parseInt(t);
  if(h>=5&&h<12)return 'morning';
  if(h>=12&&h<17)return 'afternoon';
  if(h>=17&&h<21)return 'evening';
  return 'night';
}

function load(){try{const r=localStorage.getItem(sk(TODAY));tasks=r?JSON.parse(r):[]}catch{tasks=[]}}
function save(){localStorage.setItem(sk(TODAY),JSON.stringify(tasks))}

function addTask(d){tasks.push({id:uid(),title:d.title.trim(),time:d.time||'',section:d.section,category:d.category,completed:false,important:!!d.important,notes:d.notes||'',location:d.location||''});save();render();toast('Task added')}
function updateTask(id,d){const t=tasks.find(x=>x.id===id);if(!t)return;Object.assign(t,d);save();render();toast('Updated')}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);save();render();toast('Deleted')}
function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t){t.completed=!t.completed;save();render()}}
function toggleStar(id){const t=tasks.find(x=>x.id===id);if(t){t.important=!t.important;save();render()}}

function duplicateYesterday(){
  try{
    const r=localStorage.getItem(sk(YESTERDAY));
    if(!r){toast('No plan for yesterday');return}
    const yt=JSON.parse(r);
    if(!yt.length){toast('Yesterday was empty');return}
    tasks=[...tasks,...yt.map(t=>({...t,id:uid(),completed:false}))];
    save();render();toast('Copied '+yt.length+' tasks');
  }catch{toast('Could not load yesterday')}
}

function clearAll(){
  if(!tasks.length){toast('Nothing to clear');return}
  if(!confirm('Clear all tasks for today?'))return;
  tasks=[];save();render();toast('Cleared');
}

function openModal(secId){
  editId=null;lastFocused=document.activeElement;
  document.getElementById('modal-ttl').textContent='Add Task';
  document.getElementById('edit-id').value='';
  document.getElementById('f-title').value='';
  document.getElementById('f-time').value='';
  document.getElementById('f-loc').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-important').checked=false;
  document.getElementById('f-title').removeAttribute('aria-invalid');
  document.querySelector('input[name="sec"][value="'+(secId||'morning')+'"]').checked=true;
  document.querySelector('input[name="cat"][value="personal"]').checked=true;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),200);
}

function openEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editId=id;lastFocused=document.activeElement;
  document.getElementById('modal-ttl').textContent='Edit Task';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-time').value=t.time;
  document.getElementById('f-loc').value=t.location;
  document.getElementById('f-notes').value=t.notes;
  document.getElementById('f-important').checked=t.important;
  document.getElementById('f-title').removeAttribute('aria-invalid');
  document.querySelector('input[name="sec"][value="'+t.section+'"]').checked=true;
  document.querySelector('input[name="cat"][value="'+t.category+'"]').checked=true;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),200);
}

function closeModal(){document.getElementById('overlay').classList.remove('open');editId=null;if(lastFocused)lastFocused.focus()}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}

function saveTask(){
  const el=document.getElementById('f-title');
  const title=el.value.trim();
  if(!title){el.setAttribute('aria-invalid','true');el.focus();setTimeout(()=>el.removeAttribute('aria-invalid'),1500);return}
  const time=document.getElementById('f-time').value;
  const sec=document.querySelector('input[name="sec"]:checked').value;
  const cat=document.querySelector('input[name="cat"]:checked').value;
  const autoSec=time?(secFromTime(time)||sec):sec;
  const d={title,time,section:autoSec,category:cat,
    location:document.getElementById('f-loc').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    important:document.getElementById('f-important').checked};
  editId?updateTask(editId,d):addTask(d);
  closeModal();
}

// Focus trap
document.getElementById('overlay').addEventListener('keydown',function(e){
  if(!this.classList.contains('open')||e.key!=='Tab')return;
  const modal=document.getElementById('modal');
  const els=Array.from(modal.querySelectorAll('button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled])'));
  if(!els.length)return;
  const first=els[0],last=els[els.length-1];
  if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}
  else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}
});

// Drag & Drop
function dstart(e,id){dragSrc=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const c=document.querySelector('[data-id="'+id+'"]');if(c)c.classList.add('dragging')},0)}
function dend(){dragSrc=null;document.querySelectorAll('.card').forEach(c=>c.classList.remove('dragging','drag-over'));document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('drag-over'))}
function doverTask(e,id){e.preventDefault();if(id===dragSrc)return;document.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));const c=document.querySelector('[data-id="'+id+'"]');if(c)c.classList.add('drag-over')}
function doverZone(e,sid){e.preventDefault();document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('drag-over'));const z=document.getElementById('zone-'+sid);if(z)z.classList.add('drag-over')}
function dropTask(e,tid){
  e.preventDefault();e.stopPropagation();if(!dragSrc||dragSrc===tid)return;
  const si=tasks.findIndex(t=>t.id===dragSrc),ti=tasks.findIndex(t=>t.id===tid);
  if(si<0||ti<0)return;
  tasks[si].section=tasks[ti].section;
  const[src]=tasks.splice(si,1);tasks.splice(ti,0,src);
  save();render();dragSrc=null;
}
function dropZone(e,sid){e.preventDefault();if(!dragSrc)return;const t=tasks.find(x=>x.id===dragSrc);if(t){t.section=sid;save();render()}dragSrc=null}

// Render
function render(){renderSections();renderTimeline();updateProgress();updateSummary()}

function renderSections(){
  const c=document.getElementById('sections');c.innerHTML='';
  SECS.forEach(sec=>{
    const st=tasks.filter(t=>t.section===sec.id).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
    const done=st.filter(t=>t.completed).length;
    const el=document.createElement('div');
    el.className='section';el.dataset.s=sec.id;
    el.innerHTML=`
      <div class="sec-hdr"
        role="button" tabindex="0"
        aria-expanded="true"
        aria-controls="zone-${sec.id}"
        onclick="toggleSec('${sec.id}')"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleSec('${sec.id}')}">
        <div class="sec-left">
          <div class="sec-dot" aria-hidden="true"></div>
          <span class="sec-name">${sec.name}</span>
          <span class="sec-range" aria-label="${sec.range}">${sec.range}</span>
        </div>
        <div class="sec-right">
          ${st.length?`<span class="badge" aria-hidden="true">${done}/${st.length}</span>`:''}
          <span class="chevron" aria-hidden="true">▾</span>
        </div>
      </div>
      <div class="sec-body-wrap">
        <div class="sec-body">
          <div class="drop-zone" id="zone-${sec.id}"
            role="list"
            aria-label="${sec.name} tasks"
            ondragover="doverZone(event,'${sec.id}')"
            ondrop="dropZone(event,'${sec.id}')">
            ${st.length?st.map((t,i)=>cardHTML(t,i)).join(''):`<div class="sec-empty">No tasks yet</div>`}
          </div>
          <button class="add-sec-btn" onclick="openModal('${sec.id}')">+ Add to ${sec.name}</button>
        </div>
      </div>`;
    c.appendChild(el);
  });
  document.querySelectorAll('.card').forEach(card=>{
    const id=card.dataset.id;
    card.addEventListener('dragstart',e=>dstart(e,id));
    card.addEventListener('dragend',()=>dend());
    card.addEventListener('dragover',e=>doverTask(e,id));
    card.addEventListener('drop',e=>dropTask(e,id));
  });
}

function cardHTML(t,i=0){
  const col=CAT_COL[t.category]||'var(--t3)';
  return `<div class="card ${t.completed?'done':''} ${t.important?'important':''}"
    data-id="${t.id}" data-cat="${t.category}" draggable="true"
    style="--i:${i}" role="listitem">
    <div class="drag-hdl" aria-hidden="true">⠿</div>
    <div class="chkbox"
      role="checkbox" aria-checked="${t.completed}" tabindex="0"
      aria-label="${t.completed?'Mark incomplete':'Mark complete'}: ${esc(t.title)}"
      onclick="toggleDone('${t.id}')"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleDone('${t.id}')}">
      <svg class="chk-svg" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="task-body">
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <span class="task-ttl">${esc(t.title)}</span>
        ${t.important?'<span class="star-badge" aria-label="Important">★</span>':''}
      </div>
      <div class="task-meta">
        ${t.time?`<span class="task-time">${fmt12(t.time)}</span>`:''}
        <span class="task-cat" style="color:${col};background:${col.replace('var(','rgba(').replace(')',',0.12)')}">
          <span class="cat-dot" style="background:${col}" aria-hidden="true"></span>${CAT_LBL[t.category]||t.category}
        </span>
        ${t.location?`<span class="task-loc">${esc(t.location)}</span>`:''}
      </div>
      ${t.notes?`<div class="task-note">${esc(t.notes)}</div>`:''}
    </div>
    <div class="card-acts" role="group" aria-label="Task actions">
      <button class="act-btn ${t.important?'starred':''}" onclick="toggleStar('${t.id}')" aria-label="${t.important?'Remove important':'Mark important'}" aria-pressed="${t.important}">★</button>
      <button class="act-btn" onclick="openEdit('${t.id}')" aria-label="Edit">✎</button>
      <button class="act-btn" onclick="deleteTask('${t.id}')" aria-label="Delete">✕</button>
    </div>
  </div>`;
}

function renderTimeline(){
  const body=document.getElementById('tl-body');
  const all=[...tasks].sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  if(!all.length){
    body.innerHTML=`<div class="tl-empty"><div class="tl-empty-icon" aria-hidden="true">◈</div><div class="tl-empty-txt">No tasks yet.<br>Add one to get started.</div></div>`;
    return;
  }
  let html='';
  SECS.forEach(sec=>{
    const st=all.filter(t=>t.section===sec.id);if(!st.length)return;
    html+=`<div class="tl-sec">
      <div class="tl-sec-hdr">
        <div class="tl-sec-dot" style="background:${sec.col}" aria-hidden="true"></div>
        <span class="tl-sec-lbl">${sec.name}</span>
        <div class="tl-sec-line" aria-hidden="true"></div>
      </div>
      ${st.map((t,i)=>`<div class="tl-item">
        <div class="tl-tcol"><span class="tl-time">${t.time?fmt12(t.time):''}</span></div>
        <div class="tl-dcol" aria-hidden="true">
          <div class="tl-dot" style="background:${CAT_COL[t.category]}"></div>
          ${i<st.length-1?'<div class="tl-line"></div>':''}
        </div>
        <div class="tl-content">
          <div class="tl-task-ttl ${t.completed?'done':''}">${t.important?'★ ':''}${esc(t.title)}</div>
          ${t.category?`<div class="tl-meta">${CAT_LBL[t.category]||''}${t.location?' · '+esc(t.location):''}</div>`:''}
        </div>
      </div>`).join('')}
    </div>`;
  });
  body.innerHTML=html;
}

function updateProgress(){
  const total=tasks.length,done=tasks.filter(t=>t.completed).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=pct+'%';
  const bar=document.getElementById('prog-bar');
  bar.setAttribute('aria-valuenow',pct);
  bar.setAttribute('aria-valuetext',done+' of '+total+' tasks completed');
}

function updateSummary(){
  const total=tasks.length,done=tasks.filter(t=>t.completed).length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-up').textContent=total-done;
}

function toggleSec(id){
  const el=document.querySelector('.section[data-s="'+id+'"]');
  if(el){
    const collapsed=el.classList.toggle('collapsed');
    const hdr=el.querySelector('.sec-hdr');
    if(hdr)hdr.setAttribute('aria-expanded',String(!collapsed));
  }
}

function mobileView(v){
  const isL=v==='list';
  const lBtn=document.getElementById('vbtn-list'),tBtn=document.getElementById('vbtn-tl');
  lBtn.classList.toggle('active',isL);tBtn.classList.toggle('active',!isL);
  lBtn.setAttribute('aria-pressed',String(isL));tBtn.setAttribute('aria-pressed',String(!isL));
  document.getElementById('sections').style.display=isL?'':'none';
  document.getElementById('summary').style.display=isL?'':'none';
  document.getElementById('tl-panel').classList.toggle('show',!isL);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2400);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('overlay').classList.contains('open'))closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&document.getElementById('overlay').classList.contains('open'))saveTask();
});
document.getElementById('f-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveTask()});
document.getElementById('f-time').addEventListener('change',function(){
  const s=secFromTime(this.value);
  if(s)document.querySelector('input[name="sec"][value="'+s+'"]').checked=true;
});

(function(){
  document.getElementById('dt-display').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const yRaw=localStorage.getItem(sk(YESTERDAY));
  if(!yRaw||!JSON.parse(yRaw).length)document.getElementById('dup-btn').style.display='none';
  load();render();
})();
</script>
</body>
</html>
